<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>" />
    <title>PWA 待办清单</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --primary-dark: #3730A3;
            --bg: #F3F4F6;
            --card: #FFFFFF;
            --text: #1F2937;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 16px 40px;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 主容器 ===== */
        .app-container {
            max-width: 520px;
            width: 100%;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px 32px;
            transition: var(--transition);
        }

        /* ===== 头部 ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--bg);
        }

        .app-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-header .badge {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            background: rgba(79, 70, 229, 0.10);
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.3px;
            -webkit-text-fill-color: var(--primary);
        }

        /* ===== 安装提示横幅 ===== */
        .install-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #EEF2FF, #E0E7FF);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(79, 70, 229, 0.20);
        }

        .install-banner.show {
            display: flex;
        }

        .install-banner .message {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary-dark);
        }

        .install-banner .message span {
            font-size: 22px;
        }

        .install-banner .btn-install {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.30);
        }

        .install-banner .btn-install:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .install-banner .btn-install:active {
            transform: scale(0.96);
        }

        .install-banner .btn-close-install {
            background: transparent;
            border: none;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .status-bar .count {
            font-weight: 600;
            color: var(--text);
        }

        .status-bar .filter-group {
            display: flex;
            gap: 6px;
        }

        .status-bar .filter-btn {
            background: transparent;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .status-bar .filter-btn:hover {
            background: var(--bg);
        }

        .status-bar .filter-btn.active {
            background: var(--primary);
            color: #fff;
        }

        /* ===== 输入区域 ===== */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text);
        }

        .input-area input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        .input-area input::placeholder {
            color: var(--text-secondary);
        }

        .input-area .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0 22px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
        }

        .input-area .btn-add:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .input-area .btn-add:active {
            transform: scale(0.96);
        }

        /* ===== 待办列表 ===== */
        .todo-list {
            list-style: none;
            margin-top: 4px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: var(--transition);
            animation: slideUp 0.25s ease;
        }

        .todo-item:hover {
            background: #E8EAF0;
        }

        .todo-item .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: var(--transition);
            background: #fff;
        }

        .todo-item .checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .todo-item .checkbox.checked::after {
            content: "✓";
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }

        .todo-item .todo-text {
            flex: 1;
            font-size: 15px;
            word-break: break-word;
            transition: var(--transition);
        }

        .todo-item .todo-text.completed {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .todo-item .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: var(--transition);
            line-height: 1;
        }

        .todo-item .btn-delete:hover {
            background: rgba(239, 68, 68, 0.12);
            color: #EF4444;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 48px 20px 32px;
            color: var(--text-secondary);
        }

        .empty-state .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* ===== 底部 ===== */
        .app-footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 2px solid var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .app-footer .clear-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .app-footer .clear-btn:hover {
            background: rgba(239, 68, 68, 0.08);
            color: #EF4444;
        }

        .app-footer .offline-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .app-footer .offline-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .app-footer .offline-status .dot.online {
            background: #22C55E;
        }

        .app-footer .offline-status .dot.offline {
            background: #EF4444;
            animation: pulse 1.5s infinite;
        }

        /* ===== 动画 ===== */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .app-container {
                padding: 20px 16px 24px;
            }
            .app-header h1 {
                font-size: 20px;
            }
            .input-area .btn-add {
                padding: 0 16px;
                font-size: 14px;
            }
            .todo-item {
                padding: 12px 14px;
            }
        }

        /* ===== 暗色模式 (可选) ===== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --card: #1F2937;
                --text: #F9FAFB;
                --text-secondary: #9CA3AF;
                --border: #374151;
                --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            }
            .input-area input {
                background: #111827;
                color: #F9FAFB;
            }
            .input-area input:focus {
                background: #1F2937;
            }
            .todo-item {
                background: #111827;
            }
            .todo-item:hover {
                background: #1F2937;
            }
            .todo-item .checkbox {
                background: #1F2937;
                border-color: #4B5563;
            }
            .install-banner {
                background: linear-gradient(135deg, #1E1B4B, #312E81);
                border-color: rgba(129, 140, 248, 0.25);
            }
            .install-banner .message {
                color: #A5B4FC;
            }
            .app-header .badge {
                background: rgba(129, 140, 248, 0.15);
            }
        }
    </style>
</head>
<body>

    <div class="app-container" role="main">

        <!-- ===== 头部 ===== -->
        <header class="app-header">
            <h1>📋 待办清单</h1>
            <span class="badge">PWA Demo</span>
        </header>

        <!-- ===== 安装横幅 ===== -->
        <div class="install-banner" id="installBanner" role="alert">
            <div class="message">
                <span>📲</span> 安装应用，离线使用
            </div>
            <div>
                <button class="btn-install" id="installBtn">安装</button>
                <button class="btn-close-install" id="closeInstallBtn" aria-label="关闭">✕</button>
            </div>
        </div>

        <!-- ===== 状态栏 ===== -->
        <div class="status-bar">
            <span class="count" id="todoCount">0 项</span>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="active">未完成</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </div>
        </div>

        <!-- ===== 输入区域 ===== -->
        <div class="input-area">
            <input type="text" id="todoInput" placeholder="输入待办事项…" maxlength="120" autocomplete="off" />
            <button class="btn-add" id="addBtn">添加</button>
        </div>

        <!-- ===== 列表 ===== -->
        <ul class="todo-list" id="todoList"></ul>

        <!-- ===== 空状态 (由 JS 控制显示) ===== -->
        <div class="empty-state" id="emptyState">
            <span class="emoji">🎯</span>
            <p>还没有待办事项，添加一条吧！</p>
        </div>

        <!-- ===== 底部 ===== -->
        <footer class="app-footer">
            <button class="clear-btn" id="clearBtn">清除已完成</button>
            <div class="offline-status">
                <span class="dot online" id="statusDot"></span>
                <span id="statusText">在线</span>
            </div>
        </footer>

    </div>

    <!-- ============================================================ -->
    <!-- JavaScript：PWA 注册 + 待办逻辑                                -->
    <!-- ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ---- DOM 引用 ----
            const todoInput = document.getElementById('todoInput');
            const addBtn = document.getElementById('addBtn');
            const todoList = document.getElementById('todoList');
            const emptyState = document.getElementById('emptyState');
            const todoCount = document.getElementById('todoCount');
            const clearBtn = document.getElementById('clearBtn');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const installBanner = document.getElementById('installBanner');
            const installBtn = document.getElementById('installBtn');
            const closeInstallBtn = document.getElementById('closeInstallBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            // ---- 状态 ----
            let todos = [];
            let currentFilter = 'all'; // 'all' | 'active' | 'completed'
            let nextId = 1;

            // ---- 本地存储 ----
            const STORAGE_KEY = 'pwa_todos';

            function loadTodos() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed) && parsed.length) {
                            todos = parsed;
                            // 确保 id 连续性
                            const maxId = todos.reduce((max, t) => Math.max(max, t.id || 0), 0);
                            nextId = maxId + 1;
                            return;
                        }
                    }
                } catch (_) { /* ignore */ }
                // 默认示例数据
                todos = [
                    { id: nextId++, text: '学习 PWA 开发', completed: false },
                    { id: nextId++, text: '实现离线缓存', completed: false },
                    { id: nextId++, text: '添加安装提示', completed: true },
                ];
            }

            function saveTodos() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
                } catch (_) { /* ignore */ }
            }

            // ---- 渲染 ----
            function render() {
                const filtered = getFilteredTodos();
                const hasItems = filtered.length > 0;

                // 清空列表
                todoList.innerHTML = '';

                if (!hasItems) {
                    emptyState.style.display = 'block';
                    todoList.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    todoList.style.display = 'block';

                    filtered.forEach(todo => {
                        const li = document.createElement('li');
                        li.className = 'todo-item';
                        li.dataset.id = todo.id;

                        // checkbox
                        const checkbox = document.createElement('div');
                        checkbox.className = 'checkbox' + (todo.completed ? ' checked' : '');
                        checkbox.setAttribute('role', 'checkbox');
                        checkbox.setAttribute('aria-checked', todo.completed ? 'true' : 'false');
                        checkbox.tabIndex = 0;

                        // text
                        const textSpan = document.createElement('span');
                        textSpan.className = 'todo-text' + (todo.completed ? ' completed' : '');
                        textSpan.textContent = todo.text;

                        // delete button
                        const delBtn = document.createElement('button');
                        delBtn.className = 'btn-delete';
                        delBtn.innerHTML = '✕';
                        delBtn.setAttribute('aria-label', '删除');

                        li.appendChild(checkbox);
                        li.appendChild(textSpan);
                        li.appendChild(delBtn);
                        todoList.appendChild(li);

                        // ---- 事件绑定 ----
                        // 切换完成状态
                        const toggle = () => {
                            todo.completed = !todo.completed;
                            saveTodos();
                            render();
                        };
                        checkbox.addEventListener('click', toggle);
                        checkbox.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                toggle();
                            }
                        });

                        // 删除
                        delBtn.addEventListener('click', () => {
                            todos = todos.filter(t => t.id !== todo.id);
                            saveTodos();
                            render();
                        });
                    });
                }

                // 更新计数
                const total = todos.length;
                const done = todos.filter(t => t.completed).length;
                todoCount.textContent = `${total} 项 (已完成 ${done})`;

                // 更新 filter 按钮状态
                filterBtns.forEach(btn => {
                    const filter = btn.dataset.filter;
                    btn.classList.toggle('active', filter === currentFilter);
                });

                // 清空按钮状态
                clearBtn.style.display = done > 0 ? 'inline-block' : 'none';
            }

            function getFilteredTodos() {
                if (currentFilter === 'active') {
                    return todos.filter(t => !t.completed);
                } else if (currentFilter === 'completed') {
                    return todos.filter(t => t.completed);
                }
                return todos.slice(); // all
            }

            // ---- 添加待办 ----
            function addTodo() {
                const text = todoInput.value.trim();
                if (!text) {
                    todoInput.focus();
                    return;
                }
                todos.push({ id: nextId++, text, completed: false });
                saveTodos();
                todoInput.value = '';
                todoInput.focus();
                render();
            }

            // ---- 清除已完成 ----
            function clearCompleted() {
                const hasCompleted = todos.some(t => t.completed);
                if (!hasCompleted) return;
                todos = todos.filter(t => !t.completed);
                saveTodos();
                render();
            }

            // ---- 过滤切换 ----
            function setFilter(filter) {
                if (filter === currentFilter) return;
                currentFilter = filter;
                render();
            }

            // ---- 网络状态 ----
            function updateOnlineStatus() {
                const online = navigator.onLine;
                statusDot.className = 'dot ' + (online ? 'online' : 'offline');
                statusText.textContent = online ? '在线' : '离线';
            }

            // ---- PWA 安装 ----
            let deferredPrompt = null;

            function initPWA() {
                // 注册 Service Worker
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js')
                        .then(reg => {
                            console.log('[PWA] Service Worker 注册成功:', reg);
                        })
                        .catch(err => {
                            console.warn('[PWA] Service Worker 注册失败:', err);
                        });
                }

                // 监听 beforeinstallprompt
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    installBanner.classList.add('show');
                });

                // 安装按钮
                installBtn.addEventListener('click', async () => {
                    if (!deferredPrompt) return;
                    try {
                        const result = await deferredPrompt.prompt();
                        console.log('[PWA] 安装结果:', result.outcome);
                        if (result.outcome === 'accepted') {
                            installBanner.classList.remove('show');
                        }
                        deferredPrompt = null;
                    } catch (_) {
                        /* ignore */
                    }
                });

                // 关闭横幅
                closeInstallBtn.addEventListener('click', () => {
                    installBanner.classList.remove('show');
                });

                // 监听 appinstalled
                window.addEventListener('appinstalled', () => {
                    installBanner.classList.remove('show');
                    console.log('[PWA] 应用已安装');
                });
            }

            // ---- 初始化 ----
            function init() {
                loadTodos();
                render();
                updateOnlineStatus();

                // 事件绑定
                addBtn.addEventListener('click', addTodo);
                todoInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') addTodo();
                });

                clearBtn.addEventListener('click', clearCompleted);

                filterBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        setFilter(btn.dataset.filter);
                    });
                });

                // 网络状态变化
                window.addEventListener('online', updateOnlineStatus);
                window.addEventListener('offline', updateOnlineStatus);

                // PWA 相关
                initPWA();

                // 点击空白区域自动聚焦输入
                document.addEventListener('click', (e) => {
                    if (e.target.closest('.app-container') && !e.target.closest('input') && !e.target.closest(
                            'button')) {
                        todoInput.focus();
                    }
                });

                console.log('[PWA] 应用已启动 🚀');
            }

            // DOM 就绪后启动
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
